apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-agnos-overview
  namespace: agnos-monitoring
data:
  agnos-overview.json: |
    {
      "title": "Agnos DevOps Overview",
      "uid": "agnos-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "timezone": "browser",
      "tags": ["agnos", "devops", "observability"],
      "templating": {
        "list": [
          {
            "name": "env",
            "type": "custom",
            "label": "Environment",
            "query": "dev,uat,prod",
            "current": {
              "selected": true,
              "text": "dev",
              "value": "dev"
            },
            "includeAll": true,
            "allValue": ".*",
            "multi": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Targets Up",
          "type": "stat",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(up{env=~\"$env\"})"
            }
          ]
        },
        {
          "id": 2,
          "title": "API Request Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_requests_total{env=~\"$env\",service=\"api\"}[5m])) by (env)",
              "legendFormat": "{{env}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Worker Success Count (1h)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(worker_job_success_total{env=~\"$env\",service=\"worker\"}[1h])) by (env)",
              "legendFormat": "{{env}}"
            }
          ]
        }
      ]
    }
