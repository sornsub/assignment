apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-agnos-overview
  namespace: agnos-monitoring
data:
  agnos-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {"index": 0, "text": "DOWN"},
                    "1": {"index": 1, "text": "UP"}
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {"h": 7, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [
            {"expr": "up{job=\"api\"}", "legendFormat": "", "refId": "A"}
          ],
          "title": "API up status",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 7, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"api\"}[5m]))",
              "legendFormat": "requests/sec",
              "refId": "A"
            }
          ],
          "title": "API request rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 7, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"api\",status=~\"5..\"}[5m]))",
              "legendFormat": "5xx/sec",
              "refId": "A"
            }
          ],
          "title": "API error rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 7, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"api\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            }
          ],
          "title": "API p95 latency",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "Optional: only returns data when kube-state-metrics/cAdvisor metrics are available in the selected Prometheus.",
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 7},
          "id": 5,
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{pod=~\"api.*\"}[1h]))",
              "legendFormat": "restarts (1h)",
              "refId": "A"
            }
          ],
          "title": "API pod/container restarts",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "dateTimeAsIso"}, "overrides": []},
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 7},
          "id": 6,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "targets": [
            {
              "expr": "max(worker_last_success_timestamp)",
              "legendFormat": "last_success",
              "refId": "A"
            }
          ],
          "title": "Worker last successful run timestamp",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 7},
          "id": 7,
          "targets": [
            {
              "expr": "sum(increase(worker_job_success_total[1h]))",
              "legendFormat": "success (1h)",
              "refId": "A"
            }
          ],
          "title": "Worker job success count",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 14},
          "id": 8,
          "targets": [
            {
              "expr": "sum(increase(worker_job_failures_total[1h]))",
              "legendFormat": "failures (1h)",
              "refId": "A"
            }
          ],
          "title": "Worker job failure count",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "ops"}, "overrides": []},
          "gridPos": {"h": 7, "w": 8, "x": 8, "y": 14},
          "id": 9,
          "targets": [
            {
              "expr": "sum(increase(worker_retry_count_total[1h]))",
              "legendFormat": "retries (1h)",
              "refId": "A"
            }
          ],
          "title": "Worker retry count",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {"index": 0, "text": "Healthy"},
                    "1": {"index": 1, "text": "Stalled"}
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 7, "w": 8, "x": 16, "y": 14},
          "id": 10,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "targets": [
            {
              "expr": "(time() - max(worker_last_success_timestamp)) > 900",
              "legendFormat": "stalled",
              "refId": "A"
            }
          ],
          "title": "Worker stalled indicator",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["agnos", "devops", "observability"],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "Prometheus Local",
              "value": "prometheus-local"
            },
            "includeAll": false,
            "label": "Prometheus Datasource",
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Agnos DevOps Overview",
      "uid": "agnos-devops-overview",
      "version": 1,
      "weekStart": ""
    }
