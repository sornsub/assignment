apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: agnos-monitoring
data:
  prometheus-rules.yml: |
    groups:
      - name: agnos-alerts
        rules:
          - alert: HighApiErrorRate
            expr: sum(rate(http_request_errors_total[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 1) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: High API error rate
              description: API error rate above 5% for 5 minutes.

          - alert: HighApiLatencyP95
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.75
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: High request latency
              description: API p95 latency above 750ms.

          - alert: WorkerStalled
            expr: time() - max(worker_last_success_timestamp) > 900
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Worker stalled
              description: Worker has not succeeded for more than 15 minutes.

          - alert: WorkerFailuresHigh
            expr: increase(worker_job_failures_total[15m]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Worker failures high
              description: Worker failures rising in the last 15 minutes.

          - alert: CrashLoopingPods
            expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Crash looping pods
              description: Pod restart count increased significantly.

          - alert: ApiTargetDown
            expr: up{job=~"api.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: API target is down
              description: Prometheus cannot scrape API target for {{ $labels.job }} ({{ $labels.instance }}).

          - alert: WorkerTargetDown
            expr: up{job=~"worker.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: Worker target is down
              description: Prometheus cannot scrape worker target for {{ $labels.job }} ({{ $labels.instance }}).

          - alert: ScrapeTargetDownByEnv
            expr: up{env=~"dev|uat|prod"} == 0
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: Scrape target down in {{ $labels.env }}
              description: Prometheus scrape target {{ $labels.job }} is down in env={{ $labels.env }} ({{ $labels.instance }}).
