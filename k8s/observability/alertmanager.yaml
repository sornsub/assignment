apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: agnos-monitoring
data:
  alertmanager.yml.tmpl: |
    global:
      resolve_timeout: 5m
    route:
      receiver: slack-receiver
      group_by: ['alertname', 'job', 'env']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h
    receivers:
      - name: slack-receiver
        slack_configs:
          - api_url: ${SLACK_WEBHOOK_URL}
            channel: '#alerts'
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: agnos-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.1
          command: ["/bin/sh", "-c"]
          args:
            - envsubst < /etc/alertmanager/alertmanager.yml.tmpl > /etc/alertmanager/alertmanager.yml && exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --log.level=info
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-slack-secret
                  key: slack_webhook_url
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: agnos-monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
  type: ClusterIP
