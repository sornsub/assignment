# Optional: use External Secrets Operator instead of plain Secret.
# Apply only when external-secrets.io CRDs are installed.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-secret
  namespace: agnos-monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-slack-secret
    creationPolicy: Owner
  data:
    - secretKey: slack_webhook_url
      remoteRef:
        key: agnos/monitoring/alertmanager
        property: slack_webhook_url
