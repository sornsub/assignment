apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agnos-devops-dev

resources:
  - namespace.yaml
  - ../../base
  - secret.yaml
  - alertmanager-slack-secret.yaml

images:
  - name: ghcr.io/sornsub/agnos-api
    newTag: dev-latest
  - name: ghcr.io/sornsub/agnos-worker
    newTag: dev-latest

patches:
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: app-config
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: worker
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
      name: api
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
