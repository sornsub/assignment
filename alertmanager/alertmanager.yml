global:
  resolve_timeout: 5m

route:
  receiver: slack-receiver
  group_by: ['alertname', 'job', 'env']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: slack-receiver
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: '#alerts'
        send_resolved: true
